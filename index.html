<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeatsmapScout</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">


<meta name="apple-mobile-web-app-capable" content="yes"> <!-- Makes app open standalone on iOS -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> <!-- iOS status bar style -->

<style>
  * {
  box-sizing: border-box;
}

body, html {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #283d90, #1a237e);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
}

/* Page wrapper */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* Title */
h1 {
  margin: 10px 0 20px 0;
  font-size: clamp(1.4rem, 4vw, 2rem);
  text-align: center;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
  width: 100%;
  max-width: 900px;
}

.input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

label {
  margin-bottom: 5px;
  font-weight: bold;
}

input[type="number"] {
  padding: 10px 15px;
  font-size: 1rem;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  width: 140px;
}

input[type="color"] {
  width: 50px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid #fff;
  cursor: pointer;
}

button {
  padding: 10px 20px;
  font-size: 1rem;
  border-radius: 8px;
  border: none;
  background-color: #f5a623;
  color: #283d90;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background-color: #ffb84d;
  transform: scale(1.05);
}

/* Opacity slider */
#opacitySlider {
  width: 200px;
  max-width: 80vw;
}

/* Main container */
.mainContainer {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 1400px;
  align-items: center;
}

/* Canvas */
canvas {
  width: 100%;
  max-width: 1000px;
  height: auto;              /* keeps aspect ratio */
  aspect-ratio: 2 / 1;       /* matches 1200x600 */
  border-radius: 12px;
  border: 2px solid #f5a623;
  background-color: #1c2a6b;
  box-shadow: 0 8px 16px rgba(0,0,0,0.5);
}

/* Info panel */
.infoPanel {
  width: 100%;
  max-width: 400px;
  max-height: 500px;
  overflow-y: auto;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #f5a623;
  background: rgba(0,0,0,0.35);
  box-shadow: 0 8px 16px rgba(0,0,0,0.5);
}

.infoItem {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
}

.infoTitle {
  font-weight: bold;
  color: #f5a623;
}

.infoValue {
  font-size: 0.95rem;
}

/* Desktop layout */
@media (min-width: 1024px) {
  .mainContainer {
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
  }

  canvas {
    flex: 2;
  }

  .infoPanel {
    flex: 1;
    max-height: 600px;
  }
}
</style>
</head>
<body>
  <h1 id="AppTitle">HeatmapScout v1.0.0</h1>
  <h2 id="teamTitle">Enter Team Number</h2>

  <!-- Horizontal control panel -->
  <div class="controls">
    <div class="input-group">
      <label for="myInput">Team Number</label>
      <input type="number" id="myInput" placeholder="Team Number..." />
    </div>

    <div class="input-group">
      <label for="secondaryColor">Start</label>
      <input type="color" id="secondaryColor" value="#000000" />
    </div>

    <div class="input-group">
      <label for="tertiaryColor">End</label>
      <input type="color" id="tertiaryColor" value="#00ff00" />
    </div>

    <button id="confirmBtn">Confirm</button>
  </div>
    <div style="margin: 10px;">
      <label for="opacitySlider">Opacity: <span id="opacityValue">0.5</span></label>
      <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.5">
    </div>

    <div class="mainContainer"> <!-- NEW: wraps canvas + info panel -->

  <canvas id="myCanvas" width="1200" height="600"></canvas>

  <div class="infoPanel"> <!-- NEW: right panel -->
    <h3>Team Data</h3> <!-- NEW -->
    <div id="infoList"></div> <!-- NEW: container where dictionary values render -->
  </div>

  <script type="module">
    import { ImportAndDrawPath } from './src/main.js';
    import { ClearCanvas } from './src/main.js';
    import { GetDisplayData } from './src/main.js'; // NEW: function returning dictionary
    import { FetchSheetData } from './src/main.js'; // NEW: function returning dictionary
    import { DrawPaths } from './src/main.js'; // NEW: function returning dictionary
    import { DecodePolyline } from './src/main.js'; // NEW: function returning dictionary
    import { CompileAndAverage } from './src/main.js'; // NEW: function returning dictionary
    import { GetTranslations } from './src/main.js'; // NEW: function returning translations dictionary

    const input = document.getElementById('myInput');
    const startColorInput = document.getElementById('secondaryColor');
    const endColorInput = document.getElementById('tertiaryColor');
    const button = document.getElementById('confirmBtn');
    const title = document.getElementById('teamTitle');
    const opacityValue = document.getElementById('opacityValue');
    const opacitySlider = document.getElementById('opacitySlider'); // NEW: explicit variable
    const infoList = document.getElementById('infoList'); // NEW: panel container

    function renderInfo(data) {
      infoList.innerHTML = "";
      const records = Array.isArray(data) ? data : [data]; // ensure array
      records.forEach(record => {
        Object.entries(record).forEach(([title, value]) => {
          let translations = GetTranslations();
          if (!translations?.display?.[title]) return;

          const item = document.createElement("div");
          item.className = "infoItem";

          const t = document.createElement("div");
          t.className = "infoTitle";
          t.textContent = title;

          const v = document.createElement("div");
          v.className = "infoValue";

          value.split(", ").forEach(line => {
            const lineElem = document.createElement("div");
            lineElem.textContent = line;
            v.appendChild(lineElem);
          });

          item.appendChild(t);
          item.appendChild(v);
          infoList.appendChild(item);
        });
      });
    }

    

    button.addEventListener('click', () => {
      const request = { 
        filter: { value: input.value } 
      };
      const pathData = {
        color1: startColorInput.value,
        color2: endColorInput.value,
        opacity: parseFloat(opacitySlider.value)
      }
      if (!input.value) return;

      ClearCanvas();
      
      FetchSheetData(request).then(i => {
        DrawPaths(
          i?.map(x => DecodePolyline(x["Autonomous Path"] ?? "")) || [],
          pathData
        )
        const displayData = CompileAndAverage(i); // NEW: get dictionary for panel
        let translations = GetTranslations(); // NEW: get translations dictionary

        renderInfo(displayData); // NEW: draw dictionary into panel
      })


      opacitySlider.addEventListener('input', () => {
        opacityValue.textContent = parseFloat(opacitySlider.value).toFixed(2);
      });
      title.textContent = `Team ${request.filter.value}`;
      document.title = `Team ${request.filter.value}`;
    });
  </script>
  
  <script>
  // Register service worker for offline & homescreen
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('Service worker registered', reg))
      .catch(err => console.log('Service worker failed', err));
  }
</script>
</body>
</html>
